<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dynamic Frame Loader</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            width: 100%;
            overflow: hidden;
            background-color: transparent;
        }
        /* Applied to the iframe once it is created */
        .fullscreen-frame {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: none;
        }
    </style>
</head>
<body>

    <script>
        // 1. Extract the 'url' parameter from the current browser address
        const urlParams = new URLSearchParams(window.location.search);
        const targetUrl = urlParams.get('url');

        if (targetUrl) {
            // 2. Create the iframe element dynamically
            const iframe = document.createElement('iframe');
            
            // 3. Set attributes and the extracted URL
            iframe.className = 'fullscreen-frame';
            iframe.src = targetUrl;
            
            // 4. Inject into the DOM
            document.body.appendChild(iframe);
        } else {
            // Basic fallback if the URL parameter is missing
            document.body.innerHTML = `
                <div style="padding: 20px; font-family: sans-serif;">
                    <h2>No URL Provided</h2>
                    <p>Usage: <code>?url=https://example.com</code></p>
                </div>`;
        }
    </script>
</body>
</html>
